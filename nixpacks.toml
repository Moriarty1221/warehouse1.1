[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "npm install --prefix frontend",
  "npm install --prefix backend"
]

[phases.build]
cmds = [
  "npm run build --prefix frontend",
  "cd backend && npx prisma generate"
]

[start]
cmd = "cd backend && (node src/dedup.js || true) && npx prisma db push --accept-data-loss && (node src/seed.js || true) && node src/index.js"
